name: UFC Data Update

on:
  schedule:
    - cron: "0 10 * * *"   # daily at 10am UTC — resolve results from prior night's events
    - cron: "0 6 * * 1"    # full roster/records refresh every Monday 6am UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "What to update"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - roster
          - records
          - events
          - resolve
          - images

jobs:
  update-ufc-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run update script
        run: |
          MODE="${{ github.event.inputs.mode || '' }}"
          if [ -n "$MODE" ]; then
            # Manual trigger with explicit mode
            if [ "$MODE" = "all" ]; then
              python scripts/update_ufc_data.py --roster --records --events --resolve
            else
              python scripts/update_ufc_data.py --$MODE
            fi
          elif [ "${{ github.event.schedule }}" = "0 6 * * 1" ]; then
            # Monday full refresh
            python scripts/update_ufc_data.py --roster --records --events --resolve
          else
            # Daily run — just resolve results and move past events
            python scripts/update_ufc_data.py --events --resolve
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ public/fighters/ debug_ufcstats.html || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "UFC Data Bot"
          git config user.email "noreply@github.com"
          git add src/data/fighters.json src/data/events.json public/fighters/ debug_ufcstats.html || true
          git commit -m "chore: auto-update UFC fighter data and events [skip ci]"
          git pull --rebase origin main
          git push origin main
