name: Weekly UFC Data Update

on:
  schedule:
    # Every Monday at 6:00 AM UTC (after weekend UFC events)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "What to update"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - records
          - events
          - resolve
          - images

jobs:
  update-ufc-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run update script
        run: |
          MODE="${{ github.event.inputs.mode || 'all' }}"
          if [ "$MODE" = "all" ]; then
            python scripts/update_ufc_data.py --all
          else
            python scripts/update_ufc_data.py --$MODE
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ public/fighters/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "UFC Data Bot"
          git config user.email "noreply@github.com"
          git add src/data/fighters.json src/data/events.json public/fighters/
          git commit -m "chore: auto-update UFC fighter data and events [skip ci]"
          git push origin main
